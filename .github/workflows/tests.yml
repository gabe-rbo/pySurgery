name: Tests

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12"]

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Set up Julia
      uses: julia-actions/setup-julia@v2
      with:
        version: '1.9'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        python -m pip install .[test,all]

    - name: Bootstrap Julia dependencies for juliacall
      run: |
        python - <<'PY'
        import os
        os.environ.setdefault("PYTHON_JULIACALL_HANDLE_SIGNALS", "yes")
        from juliacall import Main as jl

        jl.eval("import Pkg")
        jl.eval('Pkg.add(["SparseArrays", "LinearAlgebra", "JSON", "IntegerSmithNormalForm", "AbstractAlgebra", "Statistics", "Combinatorics", "PrecompileTools", "Random", "Graphs", "SimpleWeightedGraphs", "DelaunayTriangulation"])')
        try:
            jl.eval("Pkg.precompile()")
        except Exception:
            pass
        jl.eval("using Combinatorics, AbstractAlgebra, IntegerSmithNormalForm, PrecompileTools, Graphs, SimpleWeightedGraphs, DelaunayTriangulation")
        PY

    - name: Test with pytest
      run: |
        pytest tests/
