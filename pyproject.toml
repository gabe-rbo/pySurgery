[build-system]
requires = ["setuptools", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "pysurgery"
version = "1.0.1"
description = "A high-performance Python library for Computational Surgery Theory."
dependencies = [
    "numpy>=1.22.0",
    "scipy>=1.8.0",
    "sympy>=1.10.0",
    "numba>=0.55.0",
    "pydantic>=2.0.0",
    "hypothesis>=6.0.0"
]
authors = [
  { name = "Gabriel Ribeiro", email = "gabriel.ribeiro@dcc.ufmg.br" }
]
requires-python = ">=3.10"
readme = "README.md"

[project.optional-dependencies]
tda = ["gudhi"]
mesh = ["trimesh"]
ml = ["jax", "jaxlib", "torch", "torch_geometric"]
all = ["gudhi", "trimesh", "jax", "jaxlib", "torch", "torch_geometric"]

[tool.setuptools.packages.find]
where = ["."]
include = ["pysurgery*"]

