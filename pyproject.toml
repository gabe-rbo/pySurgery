[build-system]
requires = ["setuptools", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "pysurgery"
version = "1.3"
description = "A high-performance Python library for Computational Surgery Theory."
dependencies = [
    "numpy>=2.4.4",
    "scipy>=1.17.1",
    "sympy>=1.14.1",
    "numba>=0.65.0",
    "pydantic>=2.13.2",
    "hypothesis>=6.152.1"
]
authors = [
  { name = "Gabriel Ribeiro", email = "gabriel.ribeiro@dcc.ufmg.br" }
]
requires-python = ">=3.10"
readme = "README.md"

[project.optional-dependencies]
tda = ["gudhi"]
mesh = ["trimesh"]
ml = ["jax", "jaxlib", "torch", "torch_geometric"]
all = ["gudhi", "trimesh", "jax", "jaxlib", "torch", "torch_geometric"]

[tool.setuptools.packages.find]
where = ["."]
include = ["pysurgery*"]

